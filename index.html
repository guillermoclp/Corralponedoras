<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Corral · Gestión de Gallinero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --verde-bosque:#1E3A2C;
  --verde-musgo:#33523F;
  --verde-salvia:#7C9473;
  --verde-ok:#4C7A4E;
  --crema:#F6F3EA;
  --hueso:#EFE8D6;
  --papel:#FCFAF3;
  --ambar:#C97D3B;
  --amarillo-alerta:#D9A441;
  --rojo-alerta:#B3452C;
  --tinta:#20261F;
  --tinta-suave:#57604F;
  --borde:#DAD2BA;
  --sombra: 0 8px 24px -12px rgba(30,58,44,0.35);
  --radio:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Public Sans',sans-serif;background:var(--crema);color:var(--tinta);min-height:100vh;}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--verde-salvia);color:white;}

#loading{position:fixed;inset:0;background:var(--verde-bosque);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--papel);gap:12px;z-index:200;}
.spinner{width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,0.25);border-top-color:var(--ambar);animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--verde-bosque);padding:24px;}
.auth-card{background:var(--papel);border-radius:18px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 50px -20px rgba(0,0,0,0.5);}
.auth-brand{display:flex;align-items:center;gap:9px;font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--verde-bosque);margin-bottom:6px;}
.auth-brand .egg{width:13px;height:16px;background:var(--ambar);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;display:inline-block;}
.auth-sub{color:var(--tinta-suave);font-size:13.5px;margin-bottom:24px;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--verde-bosque);margin-bottom:6px;}
.auth-field input{width:100%;padding:12px 13px;border:1.5px solid var(--borde);border-radius:9px;background:var(--crema);font-size:14.5px;}
.auth-field input:focus{outline:2px solid var(--verde-salvia);outline-offset:1px;border-color:var(--verde-salvia);}
.auth-btn{width:100%;background:var(--verde-bosque);color:var(--papel);border:none;padding:13px;border-radius:10px;font-size:14.5px;font-weight:700;margin-top:6px;}
.auth-btn:hover{background:var(--verde-musgo);}
.auth-btn:disabled{opacity:0.6;}
.auth-toggle{text-align:center;margin-top:18px;font-size:13px;color:var(--tinta-suave);}
.auth-toggle button{background:none;border:none;color:var(--verde-bosque);font-weight:700;text-decoration:underline;text-underline-offset:2px;}
.auth-msg{font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:14px;}
.auth-msg.error{background:#F3DCD3;color:var(--rojo-alerta);}
.auth-msg.ok{background:#DCE9D9;color:var(--verde-ok);}

#app{display:none;min-height:100vh;}
.topbar{background:var(--verde-bosque);color:var(--papel);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.topbar-brand{display:flex;align-items:center;gap:9px;font-family:'Fraunces',serif;font-weight:600;font-size:16px;}
.topbar-brand .egg{width:11px;height:14px;background:var(--ambar);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;display:inline-block;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-user{font-size:12.5px;color:rgba(246,243,234,0.85);}
.topbar-role{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--verde-salvia);background:rgba(255,255,255,0.08);padding:5px 11px;border-radius:999px;}
.topbar-exit{background:none;border:none;color:rgba(246,243,234,0.7);font-size:13px;text-decoration:underline;text-underline-offset:3px;}
.topbar-exit:hover{color:var(--papel);}

#operario{max-width:520px;margin:0 auto;padding:22px 16px 90px;}
.op-header{margin-bottom:18px;}
.op-header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--verde-musgo);}
.op-header h1{font-size:26px;margin:4px 0 2px;color:var(--verde-bosque);}
.op-header p{margin:0;color:var(--tinta-suave);font-size:14px;}
.card{background:var(--papel);border:1px solid var(--borde);border-radius:var(--radio);padding:18px;margin-bottom:14px;box-shadow:var(--sombra);}
.field-label{display:block;font-size:12.5px;font-weight:600;color:var(--verde-bosque);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em;}
.field-sub{font-size:12px;color:var(--tinta-suave);font-weight:400;text-transform:none;letter-spacing:0;}
input[type=date], input[type=number]{width:100%;padding:13px 14px;border:1.5px solid var(--borde);border-radius:10px;font-size:18px;background:var(--crema);color:var(--tinta);font-family:'IBM Plex Mono',monospace;}
input[type=date]:focus, input[type=number]:focus{outline:2px solid var(--verde-salvia);outline-offset:1px;border-color:var(--verde-salvia);}
.stepper{display:flex;align-items:center;gap:14px;}
.stepper button{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--verde-musgo);background:var(--papel);color:var(--verde-bosque);font-size:24px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s;}
.stepper button:active{background:var(--verde-salvia);color:white;}
.stepper .value{flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:600;color:var(--tinta);}
.stepper input.value{border:1.5px solid transparent;background:transparent;border-radius:8px;padding:6px 4px;width:100%;}
.stepper input.value:focus{outline:none;border-color:var(--verde-salvia);background:var(--crema);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:10px 16px;border-radius:999px;border:1.5px solid var(--borde);background:var(--crema);font-size:13.5px;font-weight:600;color:var(--tinta-suave);transition:all 0.15s;}
.chip.active{background:var(--verde-bosque);border-color:var(--verde-bosque);color:var(--papel);}
.chip.alert-active{background:var(--rojo-alerta);border-color:var(--rojo-alerta);color:white;}
.save-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 16px 18px;background:linear-gradient(to top, var(--crema) 70%, transparent);display:flex;justify-content:center;}
.btn-save{width:100%;max-width:488px;background:var(--verde-bosque);color:var(--papel);border:none;padding:17px;border-radius:12px;font-size:16px;font-weight:700;box-shadow:var(--sombra);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-save:active{background:var(--verde-musgo);}
.btn-save:disabled{opacity:0.65;}
.btn-save.saved{background:var(--verde-ok);}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--borde);}
.hist-item:last-child{border-bottom:none;}
.hist-date{font-size:13px;color:var(--tinta-suave);font-family:'IBM Plex Mono',monospace;min-width:70px;}
.hist-metrics{display:flex;gap:16px;align-items:center;}
.hist-metric{text-align:right;}
.hist-metric .n{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;}
.hist-metric .l{font-size:10px;color:var(--tinta-suave);text-transform:uppercase;letter-spacing:0.04em;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}
.dot.ok{background:var(--verde-ok);}
.dot.warn{background:var(--amarillo-alerta);}
.dot.bad{background:var(--rojo-alerta);}

#admin{display:flex;min-height:calc(100vh - 53px);}
.sidebar{width:210px;flex-shrink:0;background:var(--verde-bosque);color:var(--papel);padding:20px 12px;position:sticky;top:53px;height:calc(100vh - 53px);}
.side-link{display:block;width:100%;text-align:left;background:none;border:none;color:rgba(246,243,234,0.72);padding:11px 14px;border-radius:9px;font-size:14px;font-weight:500;margin-bottom:2px;}
.side-link:hover{background:rgba(255,255,255,0.06);color:var(--papel);}
.side-link.active{background:rgba(255,255,255,0.12);color:var(--papel);font-weight:600;}
.admin-main{flex:1;padding:28px 32px 60px;max-width:1180px;}
.admin-header{margin-bottom:22px;}
.admin-header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--verde-musgo);}
.admin-header h1{font-size:28px;margin:4px 0 0;color:var(--verde-bosque);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.kpi-card{background:var(--papel);border:1px solid var(--borde);border-radius:var(--radio);padding:18px;box-shadow:var(--sombra);}
.kpi-label{font-size:11.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--tinta-suave);font-weight:600;margin-bottom:8px;}
.kpi-value{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:var(--verde-bosque);}
.kpi-value.money::before{content:"Bs. ";font-size:16px;color:var(--tinta-suave);}
.kpi-sub{font-size:12px;color:var(--tinta-suave);margin-top:4px;}
.semaforo-card{background:var(--verde-bosque);border-radius:var(--radio);padding:18px 20px;color:var(--papel);display:flex;align-items:center;gap:16px;box-shadow:var(--sombra);}
.semaforo-lights{display:flex;flex-direction:column;gap:5px;background:rgba(0,0,0,0.25);padding:8px 6px;border-radius:10px;}
.semaforo-lights .l{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.15);}
.semaforo-lights .l.on-red{background:var(--rojo-alerta);box-shadow:0 0 10px var(--rojo-alerta);}
.semaforo-lights .l.on-yellow{background:var(--amarillo-alerta);box-shadow:0 0 10px var(--amarillo-alerta);}
.semaforo-lights .l.on-green{background:var(--verde-ok);box-shadow:0 0 10px var(--verde-ok);}
.semaforo-text .t1{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--verde-salvia);}
.semaforo-text .t2{font-family:'Fraunces',serif;font-size:20px;font-weight:600;}
.section-title{font-size:15px;font-weight:700;color:var(--verde-bosque);margin:0 0 12px;font-family:'Fraunces',serif;}
.two-panel{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;}
@media (max-width:900px){.two-panel{grid-template-columns:1fr;}}
.chart-card{background:var(--papel);border:1px solid var(--borde);border-radius:var(--radio);padding:18px;box-shadow:var(--sombra);}
.carton-card{background:var(--papel);border:1px solid var(--borde);border-radius:var(--radio);padding:18px;box-shadow:var(--sombra);}
.carton-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:14px 0 10px;}
.egg-cell{aspect-ratio:1;border-radius:50% 50% 48% 48%/60% 60% 42% 42%;background:var(--hueso);border:1.5px solid var(--borde);}
.egg-cell.filled{background:var(--ambar);border-color:var(--ambar);}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;padding:9px 10px;background:var(--hueso);color:var(--verde-bosque);font-size:11px;text-transform:uppercase;letter-spacing:0.04em;font-weight:700;}
th:first-child{border-top-left-radius:8px;}
th:last-child{border-top-right-radius:8px;}
td{padding:9px 10px;border-bottom:1px solid var(--borde);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(124,148,115,0.07);}
.table-wrap{background:var(--papel);border:1px solid var(--borde);border-radius:var(--radio);overflow:hidden;box-shadow:var(--sombra);margin-top:14px;}
.table-wrap-inner{overflow-x:auto;}
.num{font-family:'IBM Plex Mono',monospace;}
.tag{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--hueso);color:var(--verde-bosque);font-weight:600;}
.tag.anomalia-Enfermedad,.tag.anomalia-Depredador{background:#F3DCD3;color:var(--rojo-alerta);}
.tag.anomalia-Clima,.tag.anomalia-Estrés{background:#F5E6C8;color:#8A5D1F;}
.tag.role-admin{background:#DCE9D9;color:var(--verde-ok);}
.tag.role-operario{background:var(--hueso);color:var(--verde-bosque);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px;}
.form-grid label{display:block;font-size:11.5px;font-weight:600;color:var(--verde-bosque);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:6px;}
.form-grid input, .form-grid select{width:100%;padding:10px 11px;border:1.5px solid var(--borde);border-radius:8px;background:var(--crema);font-size:14px;}
.btn-primary{background:var(--verde-bosque);color:var(--papel);border:none;padding:11px 22px;border-radius:9px;font-size:13.5px;font-weight:700;}
.btn-primary:hover{background:var(--verde-musgo);}
.btn-primary:disabled{opacity:0.6;}
.btn-ghost{background:none;border:1.5px solid var(--borde);color:var(--tinta-suave);padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:600;}
.btn-ghost:hover{border-color:var(--verde-musgo);color:var(--verde-bosque);}
.btn-danger-ghost{background:none;border:none;color:var(--rojo-alerta);font-size:12.5px;font-weight:600;padding:4px 6px;}
.btn-danger-ghost:hover{text-decoration:underline;}
.config-block{background:var(--papel);border:1px solid var(--borde);border-radius:var(--radio);padding:20px;box-shadow:var(--sombra);margin-bottom:16px;max-width:560px;}
.config-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--borde);}
.config-row:last-child{border-bottom:none;}
.config-row .cl{font-size:14px;font-weight:600;color:var(--tinta);}
.config-row .cd{font-size:12px;color:var(--tinta-suave);margin-top:2px;}
.config-row input{width:120px;padding:9px 10px;border:1.5px solid var(--borde);border-radius:8px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:15px;background:var(--crema);}
.flock-badge{display:inline-flex;align-items:center;gap:8px;background:var(--hueso);border-radius:10px;padding:10px 14px;margin-bottom:14px;}
.flock-badge .n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--verde-bosque);}
.empty{padding:30px;text-align:center;color:var(--tinta-suave);font-size:13.5px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--verde-bosque);color:var(--papel);padding:12px 22px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sombra);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s, transform 0.25s;}
.toast.error{background:var(--rojo-alerta);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
.role-select{padding:7px 9px;border:1.5px solid var(--borde);border-radius:7px;background:var(--crema);font-size:12.5px;font-weight:600;}
.btn-edit-ghost{background:none;border:none;color:var(--verde-bosque);font-size:12.5px;font-weight:600;padding:4px 6px;}
.btn-edit-ghost:hover{text-decoration:underline;}
.modal-overlay{position:fixed;inset:0;background:rgba(30,58,44,0.55);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px;}
.modal-card{background:var(--papel);border-radius:16px;padding:26px;max-width:540px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px -20px rgba(0,0,0,0.5);}
.modal-card .section-title{margin-bottom:4px;}
.modal-note{font-size:12.5px;color:var(--tinta-suave);margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;margin-top:6px;}
.legend-row{display:flex;gap:16px;margin-top:12px;font-size:11.5px;color:var(--tinta-suave);align-items:center;}
.legend-swatch{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;}
.grouped-bars{display:flex;gap:14px;align-items:flex-end;}
.grouped-bar-set{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.grouped-bar-pair{display:flex;gap:4px;align-items:flex-end;width:100%;height:130px;justify-content:center;}
.grouped-bar-pair > div{width:16px;border-radius:4px 4px 0 0;}
@media (max-width:760px){
  #admin{flex-direction:column;}
  .sidebar{width:100%;position:static;height:auto;display:flex;overflow-x:auto;gap:4px;padding:12px;}
  .side-link{white-space:nowrap;margin-bottom:0;}
  .admin-main{padding:20px 16px 50px;}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="mono" style="font-size:12px;letter-spacing:0.06em;text-transform:uppercase;">Conectando con Corral…</div></div>

<div id="auth" style="display:none;">
  <div class="auth-card">
    <div class="auth-brand"><span class="egg"></span> Corral</div>
    <div class="auth-sub" id="auth-sub">Inicia sesión para registrar los datos del gallinero.</div>
    <div id="auth-msg"></div>
    <div class="auth-field"><label>Correo</label><input type="email" id="auth-email" autocomplete="username" placeholder="tucorreo@ejemplo.com"></div>
    <div class="auth-field"><label>Contraseña</label><input type="password" id="auth-password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="auth-btn" id="auth-submit">Iniciar sesión</button>
    <div class="auth-toggle">
      <span id="auth-toggle-text">¿Eres nuevo trabajador?</span>
      <button id="auth-toggle-btn">Crear cuenta</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand"><span class="egg"></span> Corral</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <span class="topbar-role" id="topbar-role-label"></span>
      <button class="topbar-exit" id="btn-exit">Cerrar sesión</button>
    </div>
  </div>
  <div id="operario" style="display:none;"></div>
  <div id="admin" style="display:none;">
    <div class="sidebar">
      <button class="side-link" data-tab="dashboard">Dashboard</button>
      <button class="side-link" data-tab="reportes">Reportes</button>
      <button class="side-link" data-tab="registro">Registro diario</button>
      <button class="side-link" data-tab="ventas">Ventas de maples</button>
      <button class="side-link" data-tab="gastos">Gastos</button>
      <button class="side-link" data-tab="inventario">Inventario</button>
      <button class="side-link" data-tab="contabilidad">Contabilidad</button>
      <button class="side-link" data-tab="usuarios">Usuarios</button>
      <button class="side-link" data-tab="config">Configuración</button>
    </div>
    <div class="admin-main" id="admin-main"></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal-overlay" style="display:none;">
  <div class="modal-card" id="edit-modal-content"></div>
</div>

<div class="modal-overlay" id="op-modal-overlay" style="display:none;">
  <div class="modal-card" id="op-modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   CONFIGURA AQUÍ TU PROYECTO DE SUPABASE
   (Project Settings -> API en tu panel de Supabase)
   ========================================================= */
const SUPABASE_URL = "https://kkonxuhbolojyacndbbf.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_NQ4Aeml0mu5XNUL0s1tAXQ_QEneLgrR";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// Cliente secundario, sin persistir sesión: se usa solo para que el admin
// pueda crear cuentas de operarios sin desloguearse a sí mismo.
const sbCreate = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storageKey: 'sb-create-user-session', persistSession: false, autoRefreshToken: false }
});

let session = null;
let profile = null;
let adminTab = 'dashboard';
let opForm = null;
let reportRange = null;

let cache = { config:null, flockHistory:[], registros:[], ventas:[], gastos:[], profiles:[], clientes:[], movimientos:[], cuentas:[], movimientosCuenta:[], traspasos:[] };

function uid(){ return Math.random().toString(36).slice(2,9); }
function fmtDateHuman(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('es-BO',{day:'2-digit',month:'short'});
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function monthKey(iso){ return iso.slice(0,7); }

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(()=>t.classList.remove('show'), 2400);
}
function setLoading(on){ document.getElementById('loading').style.display = on ? 'flex' : 'none'; }

let authMode = 'login';

document.getElementById('auth-toggle-btn').addEventListener('click', ()=>{
  authMode = authMode==='login' ? 'signup' : 'login';
  document.getElementById('auth-submit').textContent = authMode==='login' ? 'Iniciar sesión' : 'Crear cuenta';
  document.getElementById('auth-toggle-text').textContent = authMode==='login' ? '¿Eres nuevo trabajador?' : '¿Ya tienes cuenta?';
  document.getElementById('auth-toggle-btn').textContent = authMode==='login' ? 'Crear cuenta' : 'Iniciar sesión';
  document.getElementById('auth-msg').innerHTML = '';
});

document.getElementById('auth-submit').addEventListener('click', async ()=>{
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const msgBox = document.getElementById('auth-msg');
  const btn = document.getElementById('auth-submit');
  msgBox.innerHTML = '';
  if(!email || !password){ msgBox.innerHTML = '<div class="auth-msg error">Completa correo y contraseña.</div>'; return; }
  btn.disabled = true;

  if(authMode==='login'){
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    if(error){ msgBox.innerHTML = `<div class="auth-msg error">${error.message}</div>`; return; }
    await onAuthReady(data.session);
  } else {
    const { data, error } = await sb.auth.signUp({ email, password });
    btn.disabled = false;
    if(error){ msgBox.innerHTML = `<div class="auth-msg error">${error.message}</div>`; return; }
    if(data.session){
      await onAuthReady(data.session);
    } else {
      msgBox.innerHTML = '<div class="auth-msg ok">Cuenta creada. Revisa tu correo para confirmar el acceso y luego inicia sesión.</div>';
      authMode = 'login';
    }
  }
});

document.getElementById('btn-exit').addEventListener('click', async ()=>{
  await sb.auth.signOut();
  session = null; profile = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth').style.display = 'flex';
});

async function onAuthReady(activeSession){
  setLoading(true);
  session = activeSession;
  const { data: prof, error } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  setLoading(false);
  if(error || !prof){
    showToast('No se pudo cargar tu perfil. Intenta de nuevo.', true);
    return;
  }
  profile = prof;
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-user').textContent = profile.nombre || profile.email;
  document.getElementById('topbar-role-label').textContent = profile.role==='admin' ? 'Administrador' : 'Operario';
  document.getElementById('operario').style.display = profile.role==='operario' ? 'block':'none';
  document.getElementById('admin').style.display = profile.role==='admin' ? 'flex':'none';
  if(profile.role==='operario') await loadAndRenderOperario();
  else await loadAndRenderAdmin();
}

(async function init(){
  const { data } = await sb.auth.getSession();
  if(data.session){
    await onAuthReady(data.session);
  } else {
    setLoading(false);
    document.getElementById('auth').style.display = 'flex';
  }
})();

function porcentajePostura(r){ return r.gallinas_activas ? (r.huevos_recolectados / r.gallinas_activas) * 100 : 0; }
function consumoReal(r){ return r.alimento_servido - r.alimento_sobrante; }
function gallinazaEstimada(r){ return consumoReal(r) * 1.2; }
function costoUnitario(g){ return g.cantidad ? g.costo_total / g.cantidad : 0; }
function stockHuevos(){
  const recolectados = cache.registros.reduce((s,r)=>s+Number(r.huevos_recolectados||0),0);
  const rotos = cache.registros.reduce((s,r)=>s+Number(r.huevos_rotos||0),0);
  const vendidos = cache.ventas.reduce((s,v)=>s+Number(v.maples_vendidos||0)*30,0);
  return recolectados - rotos - vendidos;
}
function ingresosMes(mes){ return cache.ventas.filter(v=>monthKey(v.fecha)===mes).reduce((s,v)=>s+v.maples_vendidos*v.precio_maple,0); }
function gastosMes(mes){ return cache.gastos.filter(g=>monthKey(g.fecha)===mes).reduce((s,g)=>s+Number(g.costo_total),0); }
function utilidadNetaMes(mes){ return ingresosMes(mes) - gastosMes(mes); }
function mortalidadAcumulada(){ return cache.registros.reduce((s,r)=>s+Number(r.mortalidad||0),0); }
function ultimoRegistro(){ const o=[...cache.registros].sort((a,b)=>a.fecha.localeCompare(b.fecha)); return o[o.length-1]; }
function semaforoEstado(){
  const ult = ultimoRegistro();
  if(!ult) return {nivel:'sin-datos', pct:null};
  const pct = porcentajePostura(ult);
  if(pct < 50) return {nivel:'rojo', pct};
  if(pct < 70) return {nivel:'amarillo', pct};
  return {nivel:'verde', pct};
}

async function fetchVentas(){ const {data,error} = await sb.from('ventas').select('*').order('fecha',{ascending:false}); if(error) throw error; cache.ventas = data; }
async function fetchGastos(){ const {data,error} = await sb.from('gastos').select('*').order('fecha',{ascending:false}); if(error) throw error; cache.gastos = data; }

function saldoCuenta(cuentaId){
  const cuenta = cache.cuentas.find(c=>c.id===cuentaId);
  if(!cuenta) return 0;
  let saldo = Number(cuenta.saldo_inicial||0);
  cache.movimientosCuenta.filter(m=>m.cuenta_id===cuentaId).forEach(m=>{
    saldo += m.tipo==='Depósito' ? Number(m.monto) : -Number(m.monto);
  });
  cache.traspasos.forEach(t=>{
    if(t.cuenta_origen_id===cuentaId) saldo -= Number(t.monto);
    if(t.cuenta_destino_id===cuentaId) saldo += Number(t.monto);
  });
  return saldo;
}
function cuentaNombre(id){
  const c = cache.cuentas.find(x=>x.id===id);
  return c ? c.nombre : '—';
}

function clienteNombre(id){
  if(!id) return 'Sin cliente';
  const c = cache.clientes.find(x=>x.id===id);
  return c ? c.nombre : 'Cliente eliminado';
}
function stockAlimento(){
  const comprado = cache.gastos.filter(g=>g.categoria==='Alimento').reduce((s,g)=>s+Number(g.cantidad||0),0);
  const entradasManuales = cache.movimientos.filter(m=>m.categoria==='Alimento' && m.tipo==='Entrada').reduce((s,m)=>s+Number(m.cantidad||0),0);
  const salidasManuales = cache.movimientos.filter(m=>m.categoria==='Alimento' && m.tipo==='Salida').reduce((s,m)=>s+Number(m.cantidad||0),0);
  const consumido = cache.registros.reduce((s,r)=>s+consumoReal(r),0);
  return comprado + entradasManuales - salidasManuales - consumido;
}
function stockMedicina(){
  const comprado = cache.gastos.filter(g=>g.categoria==='Medicina').reduce((s,g)=>s+Number(g.cantidad||0),0);
  const entradasManuales = cache.movimientos.filter(m=>m.categoria==='Medicina' && m.tipo==='Entrada').reduce((s,m)=>s+Number(m.cantidad||0),0);
  const salidasManuales = cache.movimientos.filter(m=>m.categoria==='Medicina' && m.tipo==='Salida').reduce((s,m)=>s+Number(m.cantidad||0),0);
  return comprado + entradasManuales - salidasManuales;
}
async function fetchProfiles(){ const {data,error} = await sb.from('profiles').select('*').order('created_at',{ascending:true}); if(error) throw error; cache.profiles = data; }

async function actualizarGallinas(nuevoTotal, motivo){
  const anterior = cache.config.gallinas_activas;
  const diff = nuevoTotal - anterior;
  if(diff===0) return;
  const { error: e1 } = await sb.from('config').update({ gallinas_activas: nuevoTotal, updated_at: new Date().toISOString() }).eq('id',1);
  if(e1) throw e1;
  const { error: e2 } = await sb.from('flock_history').insert({
    cambio: diff, motivo: motivo || (diff>0 ? 'Ingreso de gallinas' : 'Ajuste de plantel'),
    total: nuevoTotal, created_by: session.user.id
  });
  if(e2) throw e2;
  cache.config.gallinas_activas = nuevoTotal;
}

function newOpForm(){
  return { fecha: todayISO(), huevosRecolectados:0, huevosRotos:0, alimentoServido:2.4, alimentoSobrante:0, aguaConsumida:3.5, mortalidad:0, tempMax:'', tempMin:'', humedad:'', anomalia:'Ninguna' };
}

async function loadAndRenderOperario(){
  setLoading(true);
  try{ await Promise.all([fetchConfig(), fetchRegistros()]); }
  catch(e){ showToast('Error cargando datos: '+e.message, true); }
  setLoading(false);
  if(!opForm) opForm = newOpForm();
  renderOperario();
}

      <div style="font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;color:var(--verde-bosque);">${cache.config.gallinas_activas}</div>
    </div>

    </div>
    <div class="card"><label class="field-label">Huevos rotos / defectuosos</label>
      <div class="stepper"><button data-step="huevosRotos" data-dir="-1">−</button><input type="number" inputmode="numeric" min="0" class="value" id="val-huevosRotos" value="${opForm.huevosRotos}"><button data-step="huevosRotos" data-dir="1">+</button></div>
    </div>
    <div class="card"><label class="field-label">Mortalidad</label>
      <div class="stepper"><button data-step="mortalidad" data-dir="-1">−</button><input type="number" inputmode="numeric" min="0" class="value" id="val-mortalidad" value="${opForm.mortalidad}"><button data-step="mortalidad" data-dir="1">+</button></div>
    </div>
    <div class="card"><label class="field-label">Alimento (kg)</label>
      <div class="two-col">
        <div><label class="field-label field-sub">Servido</label><input type="number" step="0.01" inputmode="decimal" id="op-alimentoServido" value="${opForm.alimentoServido}"></div>
        <div><label class="field-label field-sub">Sobrante</label><input type="number" step="0.01" inputmode="decimal" id="op-alimentoSobrante" value="${opForm.alimentoSobrante}"></div>
      </div>
    </div>
    <div class="card"><label class="field-label">Agua consumida (L)</label><input type="number" step="0.01" inputmode="decimal" id="op-aguaConsumida" value="${opForm.aguaConsumida}"></div>
    <div class="card"><label class="field-label">Clima del galpón</label>
      <div class="two-col">
        <div><label class="field-label field-sub">Temp. máx (°C)</label><input type="number" step="0.01" inputmode="decimal" id="op-tempMax" value="${opForm.tempMax}"></div>
        <div><label class="field-label field-sub">Temp. mín (°C)</label><input type="number" step="0.01" inputmode="decimal" id="op-tempMin" value="${opForm.tempMin}"></div>
      </div>
      <div style="margin-top:12px;"><label class="field-label field-sub">Humedad (%)</label><input type="number" step="0.01" inputmode="decimal" id="op-humedad" value="${opForm.humedad}"></div>

          <div style="display:flex;align-items:center;gap:10px;"><span class="dot ${dotClass}"></span><span class="hist-date">${fmtDateHuman(r.fecha)}</span></div>

async function guardarRegistroOperario(){
  const btn = document.getElementById('op-confirmar-guardar');
  btn.disabled = true; btn.textContent = 'Guardando…';
  const registro = {
    fecha: opForm.fecha,
    gallinas_activas: cache.config.gallinas_activas,
    huevos_recolectados: opForm.huevosRecolectados,
    huevos_rotos: opForm.huevosRotos,
    alimento_servido: opForm.alimentoServido,
    alimento_sobrante: opForm.alimentoSobrante,
    agua_consumida: opForm.aguaConsumida,
    mortalidad: opForm.mortalidad,
    temp_max: opForm.tempMax || null,
    temp_min: opForm.tempMin || null,
    humedad: opForm.humedad || null,
    anomalia: opForm.anomalia,
    created_by: session.user.id
  };
  try{
    const { error } = await sb.from('registros_diarios').upsert(registro, { onConflict:'fecha' });
    if(error) throw error;
    if(opForm.mortalidad > 0){
      await actualizarGallinas(cache.config.gallinas_activas - opForm.mortalidad, `Mortalidad registrada el ${fmtDateHuman(opForm.fecha)}`);
    }
    await fetchRegistros();
    mostrarComprobante(registro);
  }catch(e){
    showToast('No se pudo guardar: '+e.message, true);
    btn.disabled = false; btn.textContent = 'Confirmar y guardar';
  }
}

function mostrarComprobante(registro){
  window._ultimoComprobante = registro;
  document.getElementById('op-modal-content').innerHTML = `
    <div class="section-title">✓ Registro guardado</div>
    <div class="modal-note">El reporte del ${fmtDateHuman(registro.fecha)} quedó registrado correctamente.</div>
    <div class="modal-actions">
      <button class="btn-primary" id="op-imprimir">Imprimir comprobante</button>
      <button class="btn-ghost" id="op-cerrar-comprobante">Cerrar</button>
    </div>
  `;
  document.getElementById('op-modal-overlay').style.display = 'flex';
  document.getElementById('op-imprimir').addEventListener('click', ()=>imprimirComprobante(registro));
  document.getElementById('op-cerrar-comprobante').addEventListener('click', ()=>{
    closeOpModal();
    opForm = newOpForm();
    renderOperario();
  });
  showToast('Registro del día guardado');
}

function firstDayOfMonthISO(d){ const x=new Date(d); return new Date(x.getFullYear(), x.getMonth(), 1).toISOString().slice(0,10); }
function ensureReportRange(){
  if(!reportRange){ reportRange = { desde: firstDayOfMonthISO(new Date()), hasta: todayISO() }; }
}
function setReportRangePreset(preset){
  const hoy = new Date();
  if(preset==='semana'){
    const d = new Date(hoy); const dow = (d.getDay()+6)%7; d.setDate(d.getDate()-dow);
    reportRange = { desde: d.toISOString().slice(0,10), hasta: todayISO() };
  } else if(preset==='mes'){
    reportRange = { desde: firstDayOfMonthISO(hoy), hasta: todayISO() };
  } else if(preset==='mesPasado'){
    const primerDiaEsteMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    const ultimoDiaMesPasado = new Date(primerDiaEsteMes.getTime()-86400000);
    reportRange = { desde: firstDayOfMonthISO(ultimoDiaMesPasado), hasta: ultimoDiaMesPasado.toISOString().slice(0,10) };
  }
}
function inRange(fecha, desde, hasta){ return fecha >= desde && fecha <= hasta; }
function rangoResumen(desde, hasta){
  const regs = cache.registros.filter(r=>inRange(r.fecha, desde, hasta));
  const vts = cache.ventas.filter(v=>inRange(v.fecha, desde, hasta));
  const gts = cache.gastos.filter(g=>inRange(g.fecha, desde, hasta));
  const ingresos = vts.reduce((s,v)=>s+v.maples_vendidos*v.precio_maple,0);
  const gastos = gts.reduce((s,g)=>s+Number(g.costo_total),0);
  const huevos = regs.reduce((s,r)=>s+Number(r.huevos_recolectados||0),0);
  const maples = vts.reduce((s,v)=>s+v.maples_vendidos,0);
  const mortalidad = regs.reduce((s,r)=>s+Number(r.mortalidad||0),0);
  return { regs, vts, gts, ingresos, gastos, huevos, maples, mortalidad };
}
function csvEscape(val){
  if(val===null||val===undefined) return '';
  const s = String(val);
  if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function arrayToCSV(headers, rows){
  const lines = [headers.map(csvEscape).join(',')];
  rows.forEach(r=>lines.push(r.map(csvEscape).join(',')));
  return lines.join('\r\n');
}
function downloadCSV(filename, csvString){
  const blob = new Blob(['\ufeff'+csvString], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function mesLabel(m){
  const [y,mo] = m.split('-');
  return new Date(Number(y), Number(mo)-1, 1).toLocaleDateString('es-BO',{month:'short',year:'2-digit'});
}
function monthlyAggregates(){
  const map = {};
  const touch = (m)=>{ if(!map[m]) map[m] = {ingresos:0, gastos:0, huevos:0}; return map[m]; };
  cache.ventas.forEach(v=>{ touch(monthKey(v.fecha)).ingresos += v.maples_vendidos*v.precio_maple; });
  cache.gastos.forEach(g=>{ touch(monthKey(g.fecha)).gastos += Number(g.costo_total); });
  cache.registros.forEach(r=>{ touch(monthKey(r.fecha)).huevos += Number(r.huevos_recolectados||0); });
  const meses = Object.keys(map).sort();
  return meses.slice(-12).map(m=>({mes:m, ...map[m]}));
}

  cache.ventas.forEach(v=>{
    const key = v.cliente_id || 'sin-cliente';
    if(!porCliente[key]) porCliente[key] = { nombre: clienteNombre(v.cliente_id), maples:0, total:0, ultima:v.fecha };
    porCliente[key].maples += v.maples_vendidos;
    porCliente[key].total += v.maples_vendidos*v.precio_maple;
    if(v.fecha > porCliente[key].ultima) porCliente[key].ultima = v.fecha;
  });
  const clientesResumen = Object.values(porCliente).sort((a,b)=>b.total-a.total);

  return `
    <div class="admin-header"><div class="eyebrow">Tabla B</div><h1>Ventas de maples</h1></div>
    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:18px;">
      <div class="kpi-card"><div class="kpi-label">Ingresos totales</div><div class="kpi-value money">${totalIngresos.toFixed(2)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Maples vendidos</div><div class="kpi-value">${cache.ventas.reduce((s,v)=>s+v.maples_vendidos,0)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Clientes registrados</div><div class="kpi-value">${cache.clientes.length}</div></div>
    </div>
    <div class="config-block" style="max-width:100%;">
      <div class="section-title">Registrar venta</div>
      <div class="form-grid">
        <div><label>Fecha</label><input type="date" id="v-fecha" value="${todayISO()}"></div>
        <div><label>Cliente</label>
          <select id="v-cliente">
            <option value="">Sin cliente</option>
            ${cache.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}
          </select>
        </div>
        <div><label>Maples vendidos</label><input type="number" id="v-maples" min="1" value="1"></div>
        <div><label>Precio por maple (Bs.)</label><input type="number" id="v-precio" step="0.5" value="${cache.config ? cache.config.precio_maple : 25}"></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-primary" id="btn-add-venta">Registrar venta</button>
        <button class="btn-ghost" id="btn-toggle-nuevo-cliente">+ Nuevo cliente</button>
      </div>
      <div id="nuevo-cliente-form" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--borde);">
        <div class="form-grid">
          <div><label>Nombre del cliente</label><input type="text" id="nc-nombre" placeholder="Ej: Doña Rosa"></div>
          <div><label>Teléfono (opcional)</label><input type="text" id="nc-telefono" placeholder="Ej: 700 00000"></div>
        </div>
        <button class="btn-primary" id="btn-guardar-cliente">Guardar cliente</button>
      </div>
    </div>
    <div class="table-wrap"><div class="table-wrap-inner">
    <table><thead><tr><th>Fecha</th><th>Cliente</th><th>Maples</th><th>Huevos</th><th>Precio/maple</th><th>Total</th><th></th></tr></thead>
    <tbody>
      ${rows.length===0 ? `<tr><td colspan="7" class="empty">Aún no hay ventas registradas.</td></tr>` : rows.map(v=>`
      <tr><td class="num">${fmtDateHuman(v.fecha)}</td><td>${clienteNombre(v.cliente_id)}</td><td class="num">${v.maples_vendidos}</td><td class="num">${v.maples_vendidos*30}</td>
      <td class="num">Bs. ${Number(v.precio_maple).toFixed(2)}</td><td class="num">Bs. ${(v.maples_vendidos*v.precio_maple).toFixed(2)}</td>
      <td><button class="btn-edit-ghost" data-edit-venta="${v.id}">Editar</button> <button class="btn-danger-ghost" data-del-venta="${v.id}">Eliminar</button></td></tr>`).join('')}
    </tbody></table>
    </div></div>

    <div class="section-title" style="margin-top:24px;">Historial de ventas por cliente</div>
    <div class="table-wrap"><div class="table-wrap-inner">
    <table><thead><tr><th>Cliente</th><th>Maples comprados</th><th>Total comprado</th><th>Última compra</th></tr></thead>
    <tbody>
      ${clientesResumen.length===0 ? `<tr><td colspan="4" class="empty">Aún no hay ventas para agrupar.</td></tr>` : clientesResumen.map(c=>`
      <tr><td>${c.nombre}</td><td class="num">${c.maples}</td><td class="num">Bs. ${c.total.toFixed(2)}</td><td class="num">${fmtDateHuman(c.ultima)}</td></tr>`).join('')}
    </tbody></table>
    </div></div>
  `;
}

      <div class="config-block" style="max-width:100%;">
        <div class="section-title">Registrar depósito o retiro</div>

        <button class="btn-primary" id="btn-add-movcuenta" ${cache.cuentas.length===0?'disabled':''}>Registrar</button>
      </div>

    </div>

    <div class="section-title" style="margin-top:24px;">Movimientos recientes</div>

function openEditRegistro(id){
  const r = cache.registros.find(x=>String(x.id)===String(id));
  if(!r) return;
  const anomaliasOpts = ['Ninguna','Enfermedad','Clima','Estrés','Depredador'];
  document.getElementById('edit-modal-content').innerHTML = `
    <div class="section-title">Editar registro del ${fmtDateHuman(r.fecha)}</div>
    <div class="modal-note">La fecha no se puede cambiar. Editar la mortalidad aquí no ajusta el plantel automáticamente; hazlo desde Configuración si corresponde.</div>
    <div class="form-grid">
      <div><label>Gallinas activas</label><input type="number" id="em-gallinas" min="0" value="${r.gallinas_activas}"></div>
      <div><label>Huevos recolectados</label><input type="number" id="em-huevos" min="0" value="${r.huevos_recolectados}"></div>
      <div><label>Huevos rotos</label><input type="number" id="em-rotos" min="0" value="${r.huevos_rotos}"></div>
      <div><label>Mortalidad</label><input type="number" id="em-mortalidad" min="0" value="${r.mortalidad}"></div>
      <div><label>Alimento servido (kg)</label><input type="number" step="0.1" id="em-alimServido" value="${r.alimento_servido}"></div>
      <div><label>Alimento sobrante (kg)</label><input type="number" step="0.1" id="em-alimSobrante" value="${r.alimento_sobrante}"></div>
      <div><label>Agua consumida (L)</label><input type="number" step="0.1" id="em-agua" value="${r.agua_consumida}"></div>
      <div><label>Temp. máx (°C)</label><input type="number" id="em-tempMax" value="${r.temp_max ?? ''}"></div>
      <div><label>Temp. mín (°C)</label><input type="number" id="em-tempMin" value="${r.temp_min ?? ''}"></div>
      <div><label>Humedad (%)</label><input type="number" id="em-humedad" value="${r.humedad ?? ''}"></div>
      <div><label>Anomalía</label><select id="em-anomalia">${anomaliasOpts.map(a=>`<option value="${a}" ${r.anomalia===a?'selected':''}>${a}</option>`).join('')}</select></div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="em-guardar">Guardar cambios</button>
      <button class="btn-ghost" id="em-cancelar">Cancelar</button>
    </div>
  `;
  document.getElementById('edit-modal-overlay').style.display = 'flex';
  document.getElementById('em-cancelar').addEventListener('click', closeEditModal);
  document.getElementById('em-guardar').addEventListener('click', ()=>saveEditRegistro(r.id));
}
function closeEditModal(){ document.getElementById('edit-modal-overlay').style.display = 'none'; }

function bindAdminEvents(){
  document.querySelectorAll('[data-preset]').forEach(b=>b.addEventListener('click', ()=>{
    setReportRangePreset(b.dataset.preset);
    renderAdmin();
  }));
  const rrDesde = document.getElementById('rr-desde');
  const rrHasta = document.getElementById('rr-hasta');
  if(rrDesde) rrDesde.addEventListener('change', ()=>{ reportRange.desde = rrDesde.value; renderAdmin(); });
  if(rrHasta) rrHasta.addEventListener('change', ()=>{ reportRange.hasta = rrHasta.value; renderAdmin(); });
  const btnExpReg = document.getElementById('btn-export-registros');
  if(btnExpReg) btnExpReg.addEventListener('click', ()=>exportRegistrosCSV(reportRange.desde, reportRange.hasta));
  const btnExpVen = document.getElementById('btn-export-ventas');
  if(btnExpVen) btnExpVen.addEventListener('click', ()=>exportVentasCSV(reportRange.desde, reportRange.hasta));
  const btnExpGas = document.getElementById('btn-export-gastos');
  if(btnExpGas) btnExpGas.addEventListener('click', ()=>exportGastosCSV(reportRange.desde, reportRange.hasta));

  document.querySelectorAll('[data-edit-registro]').forEach(b=>b.addEventListener('click', ()=>openEditRegistro(b.dataset.editRegistro)));
  document.querySelectorAll('[data-edit-gasto]').forEach(b=>b.addEventListener('click', ()=>openEditGasto(b.dataset.editGasto)));
  document.querySelectorAll('[data-del-registro]').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar este registro?')) return;
    const { error } = await sb.from('registros_diarios').delete().eq('id', b.dataset.delRegistro);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Registro eliminado'); await loadAndRenderAdmin();
  }));
  document.querySelectorAll('[data-del-venta]').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar esta venta?')) return;
    const { error } = await sb.from('ventas').delete().eq('id', b.dataset.delVenta);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Venta eliminada'); await loadAndRenderAdmin();
  }));
  document.querySelectorAll('[data-del-gasto]').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar este gasto?')) return;
    const { error } = await sb.from('gastos').delete().eq('id', b.dataset.delGasto);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Gasto eliminado'); await loadAndRenderAdmin();
  }));
  const btnCrearUsuario = document.getElementById('btn-crear-usuario');
  if(btnCrearUsuario) btnCrearUsuario.addEventListener('click', async ()=>{
    const nombre = document.getElementById('uc-nombre').value.trim();
    const email = document.getElementById('uc-email').value.trim();
    const password = document.getElementById('uc-password').value;
    const msgBox = document.getElementById('uc-msg');
    msgBox.innerHTML = '';
    if(!email || !password){ msgBox.innerHTML = '<div class="auth-msg error">Completa correo y contraseña.</div>'; return; }
    if(password.length < 6){ msgBox.innerHTML = '<div class="auth-msg error">La contraseña debe tener al menos 6 caracteres.</div>'; return; }
    btnCrearUsuario.disabled = true; btnCrearUsuario.textContent = 'Creando…';
    const { data, error } = await sbCreate.auth.signUp({ email, password });
    btnCrearUsuario.disabled = false; btnCrearUsuario.textContent = 'Crear cuenta';
    if(error){ msgBox.innerHTML = `<div class="auth-msg error">${error.message}</div>`; return; }
    if(nombre && data.user){
      await sb.from('profiles').update({ nombre }).eq('id', data.user.id);
    }
    await sbCreate.auth.signOut();
    msgBox.innerHTML = `<div class="auth-msg ok">Cuenta creada. Comparte con ${nombre||email} el correo y la contraseña para que inicie sesión directamente.</div>`;
    document.getElementById('uc-nombre').value = '';
    document.getElementById('uc-email').value = '';
    document.getElementById('uc-password').value = '';
    await fetchProfiles();
    const main = document.getElementById('admin-main');
    const tableWrap = main.querySelector('.table-wrap');
    if(tableWrap) tableWrap.outerHTML = tplUsuariosTabla();
    bindAdminEvents();
  });

  document.querySelectorAll('[data-role-user]').forEach(sel=>sel.addEventListener('change', async ()=>{
    const { error } = await sb.from('profiles').update({ role: sel.value }).eq('id', sel.dataset.roleUser);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Rol actualizado'); await loadAndRenderAdmin();
  }));

  document.querySelectorAll('[data-del-movimiento]').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar este movimiento?')) return;
    const { error } = await sb.from('inventario_movimientos').delete().eq('id', b.dataset.delMovimiento);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Movimiento eliminado'); await loadAndRenderAdmin();
  }));

  const btnAddMovimiento = document.getElementById('btn-add-movimiento');
  if(btnAddMovimiento) btnAddMovimiento.addEventListener('click', async ()=>{
    const fecha = document.getElementById('im-fecha').value || todayISO();
    const categoria = document.getElementById('im-categoria').value;
    const tipo = document.getElementById('im-tipo').value;
    const cantidad = parseFloat(document.getElementById('im-cantidad').value)||0;
    const motivo = document.getElementById('im-motivo').value;
    if(cantidad<=0){ showToast('Indica una cantidad válida', true); return; }
    const { error } = await sb.from('inventario_movimientos').insert({ fecha, categoria, tipo, cantidad, motivo, created_by: session.user.id });
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Movimiento registrado'); await loadAndRenderAdmin();
  });

  document.querySelectorAll('[data-del-movcuenta]').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar este movimiento?')) return;
    const { error } = await sb.from('movimientos_cuenta').delete().eq('id', b.dataset.delMovcuenta);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Movimiento eliminado'); await loadAndRenderAdmin();
  }));
  document.querySelectorAll('[data-del-traspaso]').forEach(b=>b.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar este traspaso?')) return;
    const { error } = await sb.from('traspasos').delete().eq('id', b.dataset.delTraspaso);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Traspaso eliminado'); await loadAndRenderAdmin();
  }));
  document.querySelectorAll('[data-edit-venta]').forEach(b=>b.addEventListener('click', ()=>openEditVenta(b.dataset.editVenta)));
  document.querySelectorAll('[data-edit-movimiento]').forEach(b=>b.addEventListener('click', ()=>openEditMovimiento(b.dataset.editMovimiento)));

  const btnAddCuenta = document.getElementById('btn-add-cuenta');
  if(btnAddCuenta) btnAddCuenta.addEventListener('click', async ()=>{
    const nombre = document.getElementById('ca-nombre').value.trim();
    const saldo_inicial = parseFloat(document.getElementById('ca-saldo').value)||0;
    if(!nombre){ showToast('Escribe el nombre de la cuenta', true); return; }
    const { error } = await sb.from('cuentas').insert({ nombre, saldo_inicial, created_by: session.user.id });
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Cuenta creada'); await loadAndRenderAdmin();
  });

  const btnAddMovCuenta = document.getElementById('btn-add-movcuenta');
  if(btnAddMovCuenta) btnAddMovCuenta.addEventListener('click', async ()=>{
    const fecha = document.getElementById('mc-fecha').value || todayISO();
    const cuenta_id = document.getElementById('mc-cuenta').value;
    const tipo = document.getElementById('mc-tipo').value;
    const monto = parseFloat(document.getElementById('mc-monto').value)||0;
    const descripcion = document.getElementById('mc-descripcion').value;
    if(monto<=0){ showToast('Indica un monto válido', true); return; }
    const { error } = await sb.from('movimientos_cuenta').insert({ fecha, cuenta_id, tipo, monto, descripcion, created_by: session.user.id });
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Movimiento registrado'); await loadAndRenderAdmin();
  });

  const btnAddTraspaso = document.getElementById('btn-add-traspaso');
  if(btnAddTraspaso) btnAddTraspaso.addEventListener('click', async ()=>{
    const fecha = document.getElementById('tr-fecha').value || todayISO();
    const cuenta_origen_id = document.getElementById('tr-origen').value;
    const cuenta_destino_id = document.getElementById('tr-destino').value;
    const monto = parseFloat(document.getElementById('tr-monto').value)||0;
    const descripcion = document.getElementById('tr-descripcion').value;
    if(cuenta_origen_id===cuenta_destino_id){ showToast('Elige dos cuentas distintas', true); return; }
    if(monto<=0){ showToast('Indica un monto válido', true); return; }
    const { error } = await sb.from('traspasos').insert({ fecha, cuenta_origen_id, cuenta_destino_id, monto, descripcion, created_by: session.user.id });
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Traspaso registrado'); await loadAndRenderAdmin();
  });

  const btnAddVenta = document.getElementById('btn-add-venta');
  if(btnAddVenta) btnAddVenta.addEventListener('click', async ()=>{
    const fecha = document.getElementById('v-fecha').value || todayISO();
    const cliente_id = document.getElementById('v-cliente').value || null;
    const maples_vendidos = parseFloat(document.getElementById('v-maples').value)||0;
    const precio_maple = parseFloat(document.getElementById('v-precio').value)||0;
    if(maples_vendidos<=0){ showToast('Indica una cantidad de maples válida', true); return; }
    const { error } = await sb.from('ventas').insert({ fecha, cliente_id, maples_vendidos, precio_maple, created_by: session.user.id });
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Venta registrada'); await loadAndRenderAdmin();
  });

  const btnToggleNuevoCliente = document.getElementById('btn-toggle-nuevo-cliente');
  if(btnToggleNuevoCliente) btnToggleNuevoCliente.addEventListener('click', ()=>{
    const form = document.getElementById('nuevo-cliente-form');
    form.style.display = form.style.display==='none' ? 'block' : 'none';
  });

  const btnGuardarCliente = document.getElementById('btn-guardar-cliente');
  if(btnGuardarCliente) btnGuardarCliente.addEventListener('click', async ()=>{
    const nombre = document.getElementById('nc-nombre').value.trim();
    const telefono = document.getElementById('nc-telefono').value.trim();
    if(!nombre){ showToast('Escribe el nombre del cliente', true); return; }
    const { data, error } = await sb.from('clientes').insert({ nombre, telefono, created_by: session.user.id }).select().single();
    if(error){ showToast('Error: '+error.message, true); return; }
    await fetchClientes();
    showToast('Cliente agregado');
    renderAdmin();
    setTimeout(()=>{
      const sel = document.getElementById('v-cliente');
      if(sel && data) sel.value = data.id;
      const form = document.getElementById('nuevo-cliente-form');
      if(form) form.style.display = 'none';
    }, 0);
  });

  const btnAddGasto = document.getElementById('btn-add-gasto');
  if(btnAddGasto) btnAddGasto.addEventListener('click', async ()=>{
    const fecha = document.getElementById('g-fecha').value || todayISO();
    const categoria = document.getElementById('g-categoria').value;
    const descripcion = document.getElementById('g-descripcion').value;
    const cantidad = parseFloat(document.getElementById('g-cantidad').value)||0;
    const costo_total = parseFloat(document.getElementById('g-costo').value)||0;
    if(costo_total<=0){ showToast('Indica un costo total válido', true); return; }
    const { error } = await sb.from('gastos').insert({ fecha, categoria, descripcion, cantidad, costo_total, created_by: session.user.id });
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Gasto registrado'); await loadAndRenderAdmin();
  });

  const btnUpdateGallinas = document.getElementById('btn-update-gallinas');
  if(btnUpdateGallinas) btnUpdateGallinas.addEventListener('click', async ()=>{
    const nuevo = parseInt(document.getElementById('cfg-gallinas').value);
    const motivo = document.getElementById('cfg-motivo').value;
    if(isNaN(nuevo) || nuevo<0){ showToast('Ingresa un número válido', true); return; }
    try{ await actualizarGallinas(nuevo, motivo); showToast('Plantel actualizado'); await loadAndRenderAdmin(); }
    catch(e){ showToast('Error: '+e.message, true); }
  });

  const btnSavePrecios = document.getElementById('btn-save-precios');
  if(btnSavePrecios) btnSavePrecios.addEventListener('click', async ()=>{
    const precio_maple = parseFloat(document.getElementById('cfg-precioMaple').value)||0;
    const precio_alimento_kg = parseFloat(document.getElementById('cfg-precioAlimento').value)||0;
    const { error } = await sb.from('config').update({ precio_maple, precio_alimento_kg, updated_at: new Date().toISOString() }).eq('id',1);
    if(error){ showToast('Error: '+error.message, true); return; }
    showToast('Precios guardados'); await loadAndRenderAdmin();
  });
}
</script>
